<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolClash – Under Maintenance</title>
  <link rel="icon" href="images/favicon.ico" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #0e0e1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background (same as dashboard) ── */
    .bg-layer {
      position: fixed; inset: 0;
      background: url('images/bg2.png') repeat-x center bottom;
      background-size: auto 100%;
      animation: bgscroll 22s linear infinite;
      z-index: 0;
    }
    .cloud-layer {
      position: fixed; inset: 0;
      background: url('images/cloud.gif') repeat-x top center;
      background-size: auto 110px;
      animation: bgscroll 38s linear infinite;
      opacity: 0.35;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes bgscroll {
      from { background-position-x: 0; }
      to   { background-position-x: -2000px; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(8, 8, 26, 0.88);
      border: 1px solid rgba(153, 69, 255, 0.3);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 520px;
      width: 92%;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 32px 80px rgba(0,0,0,.65),
        0 0 60px rgba(153,69,255,.1);
      animation: fadeUp .6s ease-out both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-wrap img {
      width: 40px; height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(153,69,255,.5));
    }
    .logo-wrap span {
      font-size: 1.25rem;
      font-weight: 900;
      background: linear-gradient(135deg, #9945ff, #14f195);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .5px;
    }

    .wrench-icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
      animation: wobble 2.4s ease-in-out infinite;
    }
    @keyframes wobble {
      0%, 100% { transform: rotate(-8deg); }
      50%       { transform: rotate(8deg); }
    }

    .title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(.72rem, 3vw, 1rem);
      line-height: 1.7;
      background: linear-gradient(135deg, #9945ff, #14f195);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      letter-spacing: .5px;
    }

    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, #9945ff, #14f195);
      border-radius: 2px;
      margin: 0 auto 22px;
      opacity: .6;
    }

    .subtitle {
      font-size: .88rem;
      color: rgba(255,255,255,.5);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(153,69,255,.1);
      border: 1px solid rgba(153,69,255,.3);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: .78rem;
      font-weight: 700;
      color: rgba(255,255,255,.7);
      letter-spacing: .3px;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      background: #f0b840;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }
  </style>
</head>
<body>

  <div class="bg-layer" id="bgLayer"></div>
  <div class="cloud-layer"></div>

  <div class="card">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="SolClash" />
      <span>SolClash</span>
    </div>

    <span class="wrench-icon">🔧</span>

    <h1 class="title">SOL CLASH IS UNDER MAINTENANCE, PLEASE TRY AGAIN LATER!</h1>

    <div class="divider"></div>

    <p class="subtitle">
      We're working hard to improve your experience.<br />
      We'll be back online shortly.
    </p>

    <div class="status-badge">
      <div class="pulse-dot"></div>
      Maintenance in progress
    </div>
  </div>

  <script>
    // Random background — same logic as dashboard
    const BG = ['images/background-image.PNG', 'images/bg2.png', 'images/bg3.gif'];
    const bg = BG[Math.floor(Math.random() * BG.length)];
    const layer = document.getElementById('bgLayer');
    const isFixed = bg.includes('background-image') || bg.endsWith('.gif');
    layer.style.backgroundImage = `url('${bg}')`;
    if (isFixed) {
      layer.style.cssText += ';background-size:cover;background-repeat:no-repeat;background-position:center;animation:none';
    } else {
      layer.style.cssText += ';background-size:auto 100%;background-repeat:repeat-x;background-position:center bottom';
    }
  </script>
</body>
</html>
